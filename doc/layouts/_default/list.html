{{ define "main" }}
<article>
  {{ .Content }}
  {{ if not .Pages.ByWeight }}
  {{ else if or (not .File) (not (in .File.Dir "cmd")) }}
  <ul>
    {{ range .Pages.ByWeight }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a>{{ with .Description }} — {{ . }}{{ end }}</li>
    {{ end }}
  </ul>
  {{ end }}
</article>
{{ end }}
