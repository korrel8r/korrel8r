name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: # Allow manual triggers

# Security: Explicit permissions
permissions:
  contents: read
  checks: write # For test result reporting
  pull-requests: write # For PR comments

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Prevent runaway jobs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25" # Should match ../../go.mod

      - name: test
        run: make test-no-cluster
        env:
          NOLINT: 1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            coverage.out
          retention-days: 30

      - name: Test Summary
        uses: test-summary/action@v2
        if: always()
        with:
          paths: test-results/*.xml
