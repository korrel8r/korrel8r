apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- clusterrole.yaml
- clusterrolebinding.yaml
- deployment.yaml
- namespace.yaml
- service.yaml
- serviceaccount.yaml

namespace: korrel8r

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: korrel8r

images:
- name: quay.io/alanconway/korrel8r
  newName: quay.io/alanconway/korrel8r
  newTag: 0.10.0-dev
- name: quay.io/korrel8r/korrel8r
  newName: quay.io/korrel8r/korrel8r
  newTag: 0.10.0
