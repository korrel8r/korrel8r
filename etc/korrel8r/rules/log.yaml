rules:
  - name: LogToPod
    start:
      domain: log
    goal:
      domain: k8s
      classes: [Pod]
    result:
      query: |-
        k8s:Pod:{namespace: "{{.kubernetes_namespace_name}}", name: "{{.kubernetes_pod_name}}"}

  - name: SelectorToLogs
    start:
      domain: k8s
      classes: [selectors]
    goal:
      domain: log
    result:
      query: >
        log:{{logTypeForNamespace .metadata.namespace}}:{
        "namespace":"{{.metadata.namespace}}",
        "labels":{{.spec.selector.matchLabels | mustToJson}} }

  - name: PodToLogs
    start:
      domain: k8s
      classes: [Pod]
    goal:
      domain: log
    result:
      query: |-
        log:{{logTypeForNamespace .metadata.namespace}}:{"namespace":"{{.metadata.namespace}}","name":"{{.metadata.name}}"}

statusRules:
  - name: LogSeverity
    start:
      domain: log
    status: |-
      {{- $s := or (index . "level") (index . "severity_text") ""}}
      {{- if or (eq $s "error") (eq $s "err") (eq $s "ERROR") (eq $s "ERR") (eq $s "Error") (eq $s "critical") (eq $s "fatal") (eq $s "CRITICAL") (eq $s "FATAL")}}Error
      {{- else if or (eq $s "warning") (eq $s "warn") (eq $s "WARNING") (eq $s "WARN") (eq $s "Warning")}}Warning
      {{- end}}
